# llama-swap configuration for 4070 Ti SUPER (16GB) + 96GB System RAM
server:
  debug: false

# Custom macros define the shorthand used in the cmd section
macros:
  BINARY: "llama-server"                  # on PATH inside the container
  MODEL_PATH: "/mnt/models"              # matches the volume mount in compose.yaml

models:
  qwen_3.6_coding:
    ttl: 600
    path: "/mnt/models/Qwen3.6-35B/Qwen3.6-35B-A3B-UD-Q2_K_XL.gguf"
    cmd: >
      ${BINARY}
      -m /mnt/models/Qwen3.6-35B/Qwen3.6-35B-A3B-UD-Q2_K_XL.gguf
      --port ${PORT}
      --n-gpu-layers 99
      --cont-batching
      --ctx-size 131072
      --cache-type-k q4_0
      --cache-type-v q4_0
      --flash-attn on
      -b 512
      -ub 512
      --n-predict -1
      --jinja
      --chat-template-file /config/chat_template.jinja
      --host 0.0.0.0

  qwen_3.6_longctx:
    ttl: 600
    path: "/mnt/models/Qwen3.6-35B/Qwen3.6-35B-A3B-UD-Q2_K_XL.gguf"
    cmd: >
      ${BINARY}
      -m /mnt/models/Qwen3.6-35B/Qwen3.6-35B-A3B-UD-Q2_K_XL.gguf
      --port ${PORT}
      --n-gpu-layers 99
      --cont-batching
      --ctx-size 524288
      --cache-type-k q4_0
      --cache-type-v q4_0
      --flash-attn on
      -b 512
      -ub 512
      --rope-scaling yarn
      --rope-freq-base 10000000
      --yarn-orig-ctx 262144
      --yarn-ext-factor 2.0
      --no-kv-offload
      --jinja
      --chat-template-file /config/chat_template.jinja
      --host 0.0.0.0

  qwen_3.6_vision:
    ttl: 600
    path: "/mnt/models/Qwen3.6-35B/Qwen3.6-35B-A3B-UD-Q2_K_XL.gguf"
    cmd: >
      ${BINARY}
      -m /mnt/models/Qwen3.6-35B/Qwen3.6-35B-A3B-UD-Q2_K_XL.gguf
      --mmproj /config/Qwen3.6_mmproj-BF16.gguf
      --port ${PORT}
      --n-gpu-layers 99
      --cont-batching
      --ctx-size 16384
      --cache-type-k q4_0
      --cache-type-v q4_0
      --flash-attn on
      -b 512
      -ub 512
      --jinja
      --chat-template-file /config/chat_template.jinja
      --host 0.0.0.0

  gemma4_coding:
    ttl: 600
    path: "/mnt/models/Gemma4-26B/google_gemma-4-26B-A4B-it-Q4_K_M.gguf"
    cmd: >
      ${BINARY}
      -m /mnt/models/Gemma4-26B/google_gemma-4-26B-A4B-it-Q4_K_M.gguf
      --port ${PORT}
      --n-gpu-layers 20
      --cont-batching
      --ctx-size 65536
      --cache-type-k q4_0
      --cache-type-v q4_0
      --flash-attn on
      -b 512
      -ub 512
      --host 0.0.0.0

  gemma4_longctx:
    ttl: 600
    path: "/mnt/models/Gemma4-26B/google_gemma-4-26B-A4B-it-Q4_K_M.gguf"
    cmd: >
      ${BINARY}
      -m /mnt/models/Gemma4-26B/google_gemma-4-26B-A4B-it-Q4_K_M.gguf
      --port ${PORT}
      --n-gpu-layers 20
      --cont-batching
      --ctx-size 262144
      --cache-type-k q4_0
      --cache-type-v q4_0
      --flash-attn on
      -b 512
      -ub 512
      --no-kv-offload
      --host 0.0.0.0
